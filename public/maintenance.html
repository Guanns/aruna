<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemeliharaan Sistem - Aruna</title>

    <!-- Google Fonts: Quicksand & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Playfair+Display:ital,wght@1,600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #FFFBF5;
            --text-color: #6B4F4F;
            --accent-red: #c43c27;
            --accent-teal: #14b8a6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d0b0a;
                --text-color: #e6dfd5;
                --accent-red: #e04e38;
                --accent-teal: #2dd4bf;
                --card-bg: rgba(20, 18, 17, 0.85);
                --card-border: rgba(255, 255, 255, 0.08);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND FX --- */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* Noise texture */
        .bg-noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.035;
            background-image: url('https://www.transparenttextures.com/patterns/noise.png');
        }

        /* Gradient Blobs */
        .blob-red {
            position: absolute;
            top: -20%;
            right: -20%;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196, 60, 39, 0.12) 0%, rgba(196, 60, 39, 0) 70%);
            filter: blur(80px);
            animation: pulse-red 8s ease-in-out infinite alternate;
        }

        .blob-teal {
            position: absolute;
            bottom: -15%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            max-width: 700px;
            max-height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.1) 0%, rgba(20, 184, 166, 0) 70%);
            filter: blur(80px);
            animation: pulse-teal 10s ease-in-out infinite alternate;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.15) translate(-3%, 3%);
                opacity: 1;
            }
        }

        @keyframes pulse-teal {
            0% {
                transform: scale(1) translate(0, 0);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.1) translate(3%, -3%);
                opacity: 1;
            }
        }

        /* --- CONTAINER / CARD --- */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 580px;
            padding: 3rem 2.5rem;
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(107, 79, 79, 0.08);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- BADGE --- */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            background-color: rgba(196, 60, 39, 0.06);
            border: 1px solid rgba(196, 60, 39, 0.12);
            border-radius: 9999px;
            color: var(--accent-red);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .badge-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
                box-shadow: 0 0 0 0 rgba(196, 60, 39, 0.7);
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 0 6px rgba(196, 60, 39, 0);
            }

            100% {
                transform: scale(0.9);
                opacity: 0.6;
                box-shadow: 0 0 0 0 rgba(196, 60, 39, 0);
            }
        }

        /* --- LOGO / ILLUSTRATION --- */
        .icon-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.75rem;
            background: linear-gradient(135deg, var(--accent-red) 0%, #e05e4a 100%);
            color: white;
            box-shadow: 0 15px 30px rgba(196, 60, 39, 0.25);
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(2deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .icon-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.75rem;
            background: linear-gradient(135deg, var(--accent-red) 0%, #e05e4a 100%);
            filter: blur(15px);
            opacity: 0.4;
            z-index: -1;
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 1.25rem;
            color: var(--text-color);
        }

        h1 span.serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            color: var(--accent-red);
            position: relative;
            display: inline-block;
        }

        h1 span.serif-italic::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 4px;
            background: radial-gradient(ellipse at center, rgba(196, 60, 39, 0.2) 0%, rgba(196, 60, 39, 0) 100%);
            border-radius: 50%;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.65;
            opacity: 0.8;
            margin-bottom: 2.25rem;
            font-weight: 400;
        }

        /* --- PROGRESS INDICATOR --- */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(107, 79, 79, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 2.5rem;
        }

        .progress-bar {
            height: 100%;
            width: 45%;
            background: linear-gradient(90deg, var(--accent-teal), var(--accent-red));
            border-radius: 999px;
            animation: loading 2.5s ease-in-out infinite alternate;
        }

        @keyframes loading {
            0% {
                width: 10%;
                margin-left: 0%;
            }

            100% {
                width: 45%;
                margin-left: 55%;
            }
        }

        /* --- FOOTER --- */
        .footer {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo-text {
            font-weight: 700;
            color: var(--accent-red);
        }

        /* Responsive adjust */
        @media (max-width: 640px) {
            .container {
                padding: 2.5rem 1.75rem;
            }

            h1 {
                font-size: 1.85rem;
            }

            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-overlay">
        <div class="bg-noise"></div>
        <div class="blob-red"></div>
        <div class="blob-teal"></div>
    </div>

    <div class="container">
        <!-- Static Construction Icon -->
        <div class="icon-wrapper">
            <div class="icon-glow"></div>
            <!-- SVG Icon: Heart / Love -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                style="width: 42px; height: 42px;">
                <path
                    d="M11.645 20.91l-.007-.003-.003-.001a11.54 11.54 0 0 1-1.007-.575 22.84 22.84 0 0 1-4.06-3.214C3.896 14.54 2.25 11.978 2.25 9c0-2.623 2.122-4.75 4.75-4.75 1.776 0 3.33 1.004 4.125 2.47a5.22 5.22 0 0 1 4.125-2.47c2.628 0 4.75 2.127 4.75 4.75 0 2.978-1.645 5.54-4.325 8.12a22.82 22.82 0 0 1-4.06 3.215 11.36 11.36 0 0 1-1.01.576l-.004.001-.002.001-.007.003a.75.75 0 0 1-.7-.003Z" />
            </svg>
        </div>

        <!-- Typography Heading -->
        <h1>
            Pengumuman!
        </h1>

        <!-- Typography Body -->
        <p>
            Untuk senantiasa menjaga kenyamanan kamu, aplikasi Aruna saat ini sedang berada dalam pemeliharaan duluu
            yaa!
            Kami akan segera kembali secepatnya!~
        </p>

        <!-- Progress bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>© 2026</span>
            <span class="logo-text">Aruna</span>
            <span>All Rights Reserved</span>
        </div>
    </div>

</body>

</html>
